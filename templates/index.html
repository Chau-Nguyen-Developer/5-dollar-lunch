<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>5-Dollar Office Gift</title>
        <!-- <link rel="stylesheet" href="style.css"> -->

    <style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to bottom, #f4f6f9, #ffffff);
  }

  .page {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .shell {
    width: 100%;
    max-width: 900px;
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  .top h2 {
    margin: 0;
    font-size: 22px;
    color: #1f2937;
  }

  .subtitle {
    margin-top: 8px;
    color: #6b7280;
    font-size: 14px;
  }

  /* 🔥 Force vertical stacking */
  .content {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 20px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .search-row input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 14px;
  }

  .search-row input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
  }

  .search-row button {
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background-color: #2563eb;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s ease;
    white-space: nowrap;
  }

  .search-row button:hover {
    background-color: #1d4ed8;
  }

  .results {
    width: 100%;
    background: #e9eef3;
    padding: 20px;
    border-radius: 12px;
  }

  .results-title {
    margin: 0 0 15px 0;
    font-weight: bold;
    color: #111827;
    font-size: 16px;
  }

  #result_list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  /* ===== Product Row ===== */

  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px;
    margin-bottom: 12px;
    background: white;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .result-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.06);
  }

  .item-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .item-left img {
    width: 65px;
    height: 65px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    background-color: #f3f4f6;
    flex-shrink: 0;
  }

  .item-name {
    font-weight: 600;
    font-size: 15px;
    color: #1f2937;
  }

  .item-price {
    font-weight: bold;
    font-size: 16px;
    color: #2563eb;
    white-space: nowrap;
  }

  /* ===== Responsive ===== */

  @media (max-width: 600px) {
    .search-row {
      flex-direction: column;
    }

    .search-row button {
      width: 100%;
    }

    .result-item {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .item-price {
      align-self: flex-end;
    }
  }
    </style>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script>
            //1. User clicks on the search button -> Grab the budget value. 
            function search()
            {
                console.log("Button is clicked.");
                var budget = $("#budget_input").val();
                console.log("My budget: " + budget);
            
            //2. Call the backend server URL /search/<budget> to get the result. 

            // AJAX : "Asynchronous JavaScript and XML" is a set of web development techniques that 
            // allows web pages to communicate with a server in the background 
            // and update content dynamically without reloading the entire page
            $.ajax(
                {
                    url: `/search/${encodeURIComponent(budget)}`, //e.g. /search/500
                    method: "GET",
                    dataType: "json", //we expect JSON back
                    success: function(data) 
                    {
                        console.log("Success:", data);

                        // TO DO: render results to page

                        // Clear the previous result whenever do a new call. 
                        $("#result_list").empty();
                        
                        //Use for loop to print out each element of the new call. 
                        for(var i = 0; i < data.length; ++i)
                        {
                            // console.log("Test: " + data[i].name);
                            // console.log("Test: " + data[i].price);
                            $("#result_list").append(`
                                <li class="result-item">
                                    <div class="item-left">
                                    <img src="${data[i].image_url}" alt="${data[i].name}">
                                    <div class="item-name">${data[i].name}</div>
                                    </div>
                                    <div class="item-price">$${data[i].price.toFixed(2)}</div>
                                </li>
                                `);
                        }
                    },
                    error: function(xhr, status, error) 
                    {
                        console.error("Error:", status, error, xhr.responseText);
                        $("#data").html("Something went wrong.");
                    }
                });
            }

            //3. Render the results under the list. 

        </script>


    </head>

    <body>
  <div class="page">
    <div class="shell">

      <div class="top">
        <h2>Welcome to 5-Dollar Giftshop. Dedicated for office work.</h2>
        <p class="subtitle">Enter a budget to see gift ideas.</p>
      </div>

      <div class="content">
        <div class="search-row">
          <input type="text" id="budget_input" placeholder="Enter budget">
          <button onclick="search()">Search</button>
          <img srou
        </div>

        <div class="results">
          <p class="results-title">Results</p>
          <ul id="result_list"></ul>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
